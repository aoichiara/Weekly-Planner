<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Gantt — Year Planner</title>
<style>
  :root{
    --bg:#f7f6f3; --panel:#ffffff; --border:#e2e0da; --border-strong:#c9c6bc;
    --text:#1f1d1a; --text-soft:#6b6862; --text-faint:#9b9890;
    --accent:#2b2a28;
    --row-h:34px; --header-h:64px; --sidebar-w:230px; --people-w:150px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); font-size:13px;
  }
  #app{display:flex; flex-direction:column; height:100vh;}

  /* ---------- Top bar ---------- */
  #topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; background:var(--panel); border-bottom:1px solid var(--border);
    flex-shrink:0; gap:16px; flex-wrap:wrap;
  }
  #topbar h1{font-size:16px; font-weight:600; margin:0; letter-spacing:-0.01em; display:flex; align-items:center; gap:8px;}
  #topbar .sub{font-size:11.5px; color:var(--text-soft); margin-top:2px;}
  #shared-badge{
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
    background:#e3efce; color:#3c530e; padding:2px 8px; border-radius:10px;
  }
  #sync-status{font-style:italic;}
  #sync-status.sync-error{color:#a33b2d; font-style:normal;}
  .tb-controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .btn{
    border:1px solid var(--border-strong); background:#fff; color:var(--text);
    padding:7px 13px; border-radius:6px; font-size:12.5px; cursor:pointer;
    font-weight:500; display:inline-flex; align-items:center; gap:6px;
    transition:background .12s;
  }
  .btn:hover{background:#f1efe9;}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  .btn.primary:hover{background:#000;}
  .btn.danger{color:#a33b2d; border-color:#dcb5a8;}
  .btn.danger:hover{background:#fbf0ed;}
  .btn:disabled{opacity:.4; cursor:default;}
  select, input[type=text], input[type=date], input[type=number], textarea{
    font-family:inherit; font-size:12.5px; padding:6px 9px; border:1px solid var(--border-strong);
    border-radius:6px; background:#fff; color:var(--text);
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:#8a8780; box-shadow:0 0 0 2px rgba(0,0,0,.06);}

  /* ---------- Legend ---------- */
  #legend{
    display:flex; gap:18px; padding:8px 20px; background:#fbfaf7; border-bottom:1px solid var(--border);
    font-size:11.5px; color:var(--text-soft); flex-wrap:wrap; align-items:center; flex-shrink:0;
  }
  .legend-group{display:flex; gap:14px; align-items:center;}
  .legend-sep{width:1px; height:14px; background:var(--border-strong);}
  .legend-item{display:flex; align-items:center; gap:6px;}
  .legend-swatch{width:22px; height:0; border-top:3px solid #555; display:inline-block;}
  .legend-swatch.dashed{border-top-style:dashed;}
  .legend-swatch.risk{border-top:4px solid #c0392b;}
  .legend-swatch.cancelled{border-top:3px solid #b9b6ad; opacity:.6;}

  /* ---------- Main layout ---------- */
  #main{flex:1; display:flex; overflow:hidden; min-height:0;}
  #chart-scroll{flex:1; overflow:auto; position:relative;}
  #grid-wrap{position:relative; width:fit-content; min-width:100%;}

  .row-area{display:flex; width:fit-content; min-width:100%;}
  #sidebar{
    width:var(--sidebar-w); flex-shrink:0;
    background:var(--panel); border-right:1px solid var(--border-strong);
    position:sticky; left:0; z-index:5;
  }
  #timeline-area{position:relative; flex-shrink:0;}
  #people-leads, #people-members{
    width:var(--people-w); flex-shrink:0; background:var(--panel);
    border-left:1px solid var(--border);
    position:sticky; z-index:5;
  }
  #people-leads{border-left:1px solid var(--border-strong); right:var(--people-w);}
  #people-members{right:0;}

  /* header */
  #col-header{
    display:flex; position:sticky; top:0; z-index:6; background:var(--panel);
    border-bottom:1px solid var(--border-strong); height:var(--header-h); width:fit-content; min-width:100%;
  }
  #sidebar-header{
    width:var(--sidebar-w); flex-shrink:0;
    background:var(--panel); border-right:1px solid var(--border-strong); border-bottom:1px solid var(--border-strong);
    display:flex; align-items:center; padding:0 14px; height:var(--header-h);
    font-size:12px; font-weight:600; color:var(--text-soft);
    position:sticky; left:0; z-index:7;
  }
  #timeline-header-scroll{position:relative; flex-shrink:0;}
  #people-leads-header, #people-members-header{
    width:var(--people-w); flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:11.5px; font-weight:600; color:var(--text-soft); border-bottom:1px solid var(--border-strong);
    border-left:1px solid var(--border); text-align:center; padding:0 8px;
    position:sticky; z-index:7;
  }
  #people-leads-header{border-left:1px solid var(--border-strong); right:var(--people-w);}
  #people-members-header{right:0;}
  #month-row, #today-tick{position:absolute; top:0; left:0; height:100%; width:100%;}
  .month-label{
    position:absolute; top:6px; font-size:11px; font-weight:600; color:var(--text-soft);
    border-left:1px solid var(--border-strong); padding-left:6px; height:100%;
  }
  .week-tick{position:absolute; top:30px; bottom:0; border-left:1px solid var(--border); height:34px;}
  .week-tick.month-start{border-left:1px solid var(--border-strong);}

  /* rows */
  .tree-row{
    display:flex; align-items:center; border-bottom:1px solid var(--border);
    white-space:nowrap; cursor:default;
  }
  .tree-row.cat{background:#fbfaf7; font-weight:600;}
  .tree-row.sub{background:#fff;}
  .tree-row.subsub{background:#fff;}
  .tree-row .toggle{
    width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text-soft); font-size:10px; flex-shrink:0; user-select:none;
  }
  .tree-row .toggle:hover{color:var(--text);}
  .tree-row .toggle.empty{visibility:hidden;}
  .tree-row .swatch{width:9px; height:9px; border-radius:2px; flex-shrink:0; margin-right:7px;}
  .tree-row .label{overflow:hidden; text-overflow:ellipsis; flex:1;}
  .tree-row .row-actions{display:none; gap:2px; padding-right:6px;}
  .tree-row:hover .row-actions{display:flex;}
  .icon-btn{
    width:18px; height:18px; border:none; background:none; color:var(--text-faint);
    cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; border-radius:4px;
  }
  .icon-btn:hover{background:var(--border); color:var(--text);}

  /* stack toggle — shown in the sidebar row only when a row has overlapping tasks stacked into lanes */
  .stack-toggle{
    flex-shrink:0; display:inline-flex; align-items:center; gap:3px; font-size:10px;
    color:var(--text-soft); background:#eeece5; border-radius:9px; padding:2px 7px; margin-left:6px;
    cursor:pointer; user-select:none; border:1px solid var(--border-strong);
  }
  .stack-toggle:hover{background:#e2e0da; color:var(--text);}
  .stack-toggle .arrow{font-size:8px;}

  .grid-row{
    border-bottom:1px solid var(--border); position:relative;
  }
  .grid-row.cat{background:#fbfaf7;}
  .tree-row.row-highlight, .grid-row.row-highlight, .people-row.row-highlight{
    background:#fff3d6 !important;
  }

  .people-row{
    border-bottom:1px solid var(--border); display:flex; align-items:center;
    gap:4px; padding:0 8px; overflow:hidden; cursor:pointer; border-left:1px solid var(--border);
  }
  .people-row.cat{background:#fbfaf7;}
  .people-row:hover{background:#f1efe9;}
  .people-row .chip{
    font-size:10.5px; padding:2px 7px; border-radius:10px; background:#eeece5; color:var(--text-soft);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
  }
  .people-row .chip-lead{background:#e9e5fb; color:#4b3f96;}
  .people-row .placeholder{color:var(--text-faint); font-size:11px; font-style:italic;}
  .people-row .more-count{font-size:10px; color:var(--text-faint); flex-shrink:0;}

  /* task bars — `top` is set inline per-lane in JS when a row has stacked/overlapping tasks */
  .task-bar{
    position:absolute; top:5px; height:24px; border-radius:4px;
    display:flex; align-items:center; padding:0 8px; font-size:11px; font-weight:500;
    cursor:pointer; overflow:hidden; white-space:nowrap; box-sizing:border-box;
    border:2px solid transparent;
  }
  .task-bar .tlabel{overflow:hidden; text-overflow:ellipsis;}
  .task-bar.style-tentative{border-style:dashed;}
  .task-bar.style-confirmed{border-style:solid;}
  .task-bar.status-atrisk{border-width:3px !important; border-color:#c0392b !important; box-shadow:0 0 0 1px rgba(192,57,43,.25) inset;}
  .task-bar.status-cancelled{opacity:.45; filter:grayscale(.6); text-decoration:line-through;}
  .task-bar:hover{filter:brightness(0.94);}
  .task-bar.status-atrisk:hover{filter:brightness(1.05);}

  /* collapsed-stack count badge — shown on a bar when other stacked tasks are hidden behind it */
  .stack-count-badge{
    position:absolute; bottom:-2px; right:-2px; min-width:14px; height:14px; border-radius:7px;
    background:var(--accent); color:#fff; font-size:9px; font-weight:700; display:flex;
    align-items:center; justify-content:center; padding:0 3px; pointer-events:none; z-index:2;
    border:1.5px solid var(--panel);
  }

  /* end-of-bar icon badge — small visual cue floating just past the bar's end; top set inline per-lane */
  .task-end-icon{
    position:absolute; top:5px; height:24px; display:flex; align-items:center; justify-content:center;
    font-size:13px; line-height:1; cursor:pointer; pointer-events:auto; transform:translateX(4px);
  }
  /* notes indicator — small dot in the bar's top-right corner, only shown if notes exist;
     deliberately subtle since the notes themselves are meant to stay tucked away */
  .task-bar .notes-dot{
    position:absolute; top:2px; right:3px; width:6px; height:6px; border-radius:50%;
    background:currentColor; opacity:.55; pointer-events:none;
  }
  /* same idea, for category / sub-category / sub-sub-category rows in the left sidebar */
  .sidebar-notes-dot{
    width:6px; height:6px; border-radius:50%; background:var(--text-soft); opacity:.55;
    flex-shrink:0; margin-left:6px;
  }

  .milestone{
    position:absolute; top:8px; width:18px; height:18px; transform:rotate(45deg);
    cursor:pointer; border:2px solid transparent;
  }

  /* phase markers (small diamond connectors under bar, optional future) */

  #today-line{
    position:absolute; top:0; bottom:0; width:0; border-left:2px solid #c0392b; z-index:4; pointer-events:none;
  }
  #today-flag{
    position:absolute; top:34px; font-size:10px; font-weight:700; color:#c0392b; background:#fff;
    padding:1px 5px; border-radius:3px; transform:translateX(-50%); z-index:4; pointer-events:none;
    border:1px solid #c0392b;
  }

  /* ---------- Event lines (meetings / baselines) ---------- */
  #events-layer{position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;}
  .event-line{
    position:absolute; top:0; width:0; z-index:3; cursor:pointer; pointer-events:auto;
  }
  .event-line.meeting{ border-left:2px dotted #2f6fb0; }
  .event-line.baseline{ border-left:2px solid #b8860b; }
  .event-flag{
    position:absolute; font-size:10px; font-weight:700; white-space:nowrap;
    padding:2px 6px; border-radius:3px; transform:translateX(-50%); z-index:7; cursor:pointer;
    max-width:140px; overflow:hidden; text-overflow:ellipsis; pointer-events:auto;
  }
  .event-flag.meeting{ color:#1d5183; background:#eaf2fa; border:1px solid #2f6fb0; top:46px; }
  .event-flag.baseline{ color:#714c06; background:#fbf1dc; border:1px solid #b8860b; top:64px; }
  .event-flag:hover{ filter:brightness(0.96); }
  .event-hit{
    position:absolute; top:64px; bottom:0; width:10px; transform:translateX(-5px); z-index:6; cursor:pointer;
    pointer-events:auto;
  }

  /* ---------- Empty state ---------- */
  #empty-state{
    padding:60px 20px; text-align:center; color:var(--text-soft);
  }
  #empty-state .big{font-size:14px; font-weight:600; color:var(--text); margin-bottom:6px;}

  /* ---------- Modal ---------- */
  #modal-overlay{
    position:fixed; inset:0; background:rgba(20,18,15,.4); display:none;
    align-items:center; justify-content:center; z-index:50;
  }
  #modal-overlay.open{display:flex;}
  #modal{
    background:#fff; border-radius:10px; width:440px; max-width:92vw; max-height:88vh; overflow-y:auto;
    padding:22px 24px; box-shadow:0 12px 40px rgba(0,0,0,.18);
  }
  #modal h2{font-size:15px; margin:0 0 16px; font-weight:600;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:11.5px; font-weight:600; color:var(--text-soft); margin-bottom:5px;}
  .field input, .field select, .field textarea{width:100%;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .radio-grid{display:flex; flex-direction:column; gap:6px;}
  .radio-opt{
    display:flex; align-items:center; gap:8px; padding:7px 9px; border:1px solid var(--border);
    border-radius:6px; cursor:pointer; font-size:12.5px;
  }
  .radio-opt:hover{background:#fbfaf7;}
  .radio-opt input{width:auto; margin:0;}
  .radio-opt .preview-line{width:26px; height:0; border-top:3px solid #555; margin-left:auto;}
  .radio-opt .preview-line.dashed{border-top-style:dashed;}
  .radio-opt .preview-line.atrisk{border-top:4px solid #c0392b;}
  .radio-opt .preview-line.cancelled{border-top:3px solid #b9b6ad; opacity:.5;}
  #modal-actions{display:flex; justify-content:space-between; margin-top:18px; gap:8px;}
  #modal-actions .left-actions{display:flex; gap:8px;}
  .color-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
  .color-dot{width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .color-dot.selected{border-color:var(--text);}

  .icon-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
  .icon-opt{
    width:30px; height:30px; border-radius:6px; cursor:pointer; border:1px solid var(--border-strong);
    background:#fff; display:flex; align-items:center; justify-content:center; font-size:15px;
  }
  .icon-opt:hover{background:#f1efe9;}
  .icon-opt.selected{border-color:var(--text); background:#fff3d6;}
  .icon-opt.none-opt{font-size:11px; color:var(--text-soft); width:auto; padding:0 8px;}

  .scope-note{font-size:11px; color:var(--text-soft); background:#fbfaf7; border:1px solid var(--border); border-radius:6px; padding:8px 10px; margin-bottom:13px;}

  ::-webkit-scrollbar{height:10px; width:10px;}
  ::-webkit-scrollbar-thumb{background:#d8d5cc; border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div>
      <h1>Project timeline <span id="shared-badge" title="Everyone with this link sees and can edit the same data">Shared</span></h1>
      <div class="sub" id="range-label"></div>
      <div class="sub" id="sync-status">Loading\u2026</div>
    </div>
    <div class="tb-controls">
      <button class="btn" id="btn-add-cat"><span>+</span> Category</button>
      <button class="btn" id="btn-add-task">+ Task</button>
      <button class="btn" id="btn-add-meeting">+ Meeting</button>
      <button class="btn" id="btn-add-baseline">+ Baseline</button>
      <button class="btn" id="btn-today">Today</button>
      <button class="btn" id="btn-reset-zoom" title="Reset horizontal zoom back to fit-to-screen">Reset zoom</button>
      <select id="zoom-select" title="Tick density">
        <option value="week" selected>Weekly gridlines</option>
        <option value="month">Monthly gridlines</option>
        <option value="quarter">Quarterly gridlines</option>
      </select>
      <button class="btn" id="btn-export">Export JSON</button>
      <button class="btn" id="btn-export-img">📄 Export PDF / Image</button>
      <button class="btn" id="btn-import">Import JSON</button>
      <input type="file" id="file-import" accept=".json" style="display:none;">
    </div>
  </div>

  <div id="legend">
    <div class="legend-group">
      <span style="font-weight:600; color:var(--text);">Line style:</span>
      <div class="legend-item"><span class="legend-swatch"></span>Confirmed</div>
      <div class="legend-item"><span class="legend-swatch dashed"></span>Tentative</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group">
      <span style="font-weight:600; color:var(--text);">Status:</span>
      <div class="legend-item"><span class="legend-swatch risk"></span>At risk</div>
      <div class="legend-item"><span class="legend-swatch cancelled"></span>Cancelled</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group">
      <span style="font-weight:600; color:var(--text);">Events:</span>
      <div class="legend-item"><span class="legend-swatch" style="border-top:2px dotted #2f6fb0;"></span>Team meeting</div>
      <div class="legend-item"><span class="legend-swatch" style="border-top:2px solid #b8860b;"></span>Baseline release</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group">
      <span style="font-weight:600; color:var(--text);">Task extras:</span>
      <div class="legend-item"><span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:#6b6862; opacity:.55;"></span>Has notes</div>
      <div class="legend-item"><span style="font-size:13px;">★</span>End marker</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group" id="cat-legend"></div>
    <div class="legend-sep" id="person-legend-sep"></div>
    <div class="legend-group" id="person-legend" style="display:none;gap:10px;"></div>
  </div>

  <div id="main">
    <div id="chart-scroll">
      <div id="grid-wrap">
        <div id="col-header">
          <div id="sidebar-header">Category / task</div>
          <div id="timeline-header-scroll">
            <div id="month-row"></div>
          </div>
          <div id="people-leads-header">Project leads</div>
          <div id="people-members-header">Members</div>
        </div>
        <div class="row-area" id="row-area">
          <div id="sidebar"></div>
          <div id="timeline-area"></div>
          <div id="people-leads"></div>
          <div id="people-members"></div>
        </div>
        <div id="today-line"></div>
        <div id="today-flag">today</div>
        <div id="events-layer"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal"></div>
</div>

<script>
(function(){

/* ============================ DATA MODEL ============================
  categories: [{id,name,color,collapsed,leads:[],members:[],notes,children:[
    {id,name,collapsed,leads:[],members:[],notes,children:[ {id,name,leads:[],members:[],notes} ... subsub ]}
  ]}]
  tasks: [{id, catId, subId, subsubId, name, start, end, phase, lineStyle, status, notes, icon}]
======================================================================= */

const COLORS = ['blue','teal','coral','purple','amber','green','pink','red','gray','indigo','olive','magenta','navy','rust','lime','slate','gold','maroon'];
const COLOR_HEX = {
  blue:{fill:'#dbeafd', border:'#378ADD', text:'#0c447c'},
  teal:{fill:'#d9f0e6', border:'#1D9E75', text:'#085041'},
  coral:{fill:'#fbe3da', border:'#D85A30', text:'#712b13'},
  purple:{fill:'#e6e4fc', border:'#7F77DD', text:'#3c3489'},
  amber:{fill:'#fce6c0', border:'#BA7517', text:'#633806'},
  green:{fill:'#e3efce', border:'#639922', text:'#27500a'},
  pink:{fill:'#fbdfe9', border:'#D4537E', text:'#72243e'},
  red:{fill:'#fbdada', border:'#E24B4A', text:'#791f1f'},
  gray:{fill:'#e7e5dd', border:'#888780', text:'#444441'},
  indigo:{fill:'#e1e4fb', border:'#5A5FCB', text:'#2e3179'},
  olive:{fill:'#eaecd2', border:'#8a9436', text:'#454c1a'},
  magenta:{fill:'#fadcf4', border:'#B83FA0', text:'#671f59'},
  navy:{fill:'#dde3ee', border:'#33547C', text:'#1a2b40'},
  rust:{fill:'#f4ddd0', border:'#A8501F', text:'#5b290f'},
  lime:{fill:'#eaf6cf', border:'#7BAA1E', text:'#3c530e'},
  slate:{fill:'#e3e7e9', border:'#5C7480', text:'#2f3c42'},
  gold:{fill:'#f8edc6', border:'#C49A1A', text:'#6b500c'},
  maroon:{fill:'#f0d9dc', border:'#8E3A4C', text:'#4c1e27'}
};

const PHASES = ['Design phase','Design review','Finalized phase','Manufacturing','Testing','Procurement','Integration','Other'];

// Small symbol set for the end-of-bar visual cue. Kept short and generic on purpose —
// these are meant as a quick glance marker, not a full icon library.
const ICONS = ['\u2605','\u2691','\u26A0','\u2713','\u2716','\u2753','\u26A1','\uD83D\uDD25','\uD83D\uDD12','\uD83D\uDC41'];

// Person colour palette — each unique name gets a consistent colour assigned
// on first encounter, then reused everywhere (task bars, people chips, legend)
const PERSON_COLORS = [
  {bg:'#dbeafd', border:'#378ADD', text:'#0c447c', dot:'#378ADD'},  // blue
  {bg:'#d9f0e6', border:'#1D9E75', text:'#085041', dot:'#1D9E75'},  // teal
  {bg:'#fce6c0', border:'#BA7517', text:'#633806', dot:'#BA7517'},  // amber
  {bg:'#e6e4fc', border:'#7F77DD', text:'#3c3489', dot:'#7F77DD'},  // purple
  {bg:'#fbdfe9', border:'#D4537E', text:'#72243e', dot:'#D4537E'},  // pink

const DB_KEY = 'gantt-year-planner-v1';

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

function addMonths(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,10);
}
function daysBetween(a,b){
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short', day:'numeric', year:'numeric'});
}
function fmtDateShort(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short', day:'numeric'});
}

/* ---------------------- shared persistence ----------------------
   Everyone who opens this chart shares the same data via window.storage
   (shared:true). Saves are fire-and-forget so the UI never blocks on
   network latency; a background poll picks up other people's edits.
   `rev` is a simple version counter used only to detect "someone else
   changed this since I last loaded" — not for conflict resolution
   (last write still wins on actual collisions, which is fine for a
   small-team planning tool like this).
------------------------------------------------------------------- */
let lastSavedRev = 0;
let saveInFlight = null;
let suppressNextPoll = false;

function setSyncStatus(text, isError){
  const el = document.getElementById('sync-status');
  if(!el) return;
  el.textContent = text;
  el.classList.toggle('sync-error', !!isError);
}

async function save(){
  state.rev = (state.rev||0) + 1;
  lastSavedRev = state.rev;
  // keep a same-device fallback too, so the chart still works offline / if storage is unreachable
  try{ localStorage.setItem(DB_KEY, JSON.stringify(state)); }catch(e){}
  setSyncStatus('Saving…');
  suppressNextPoll = true;
  const payload = JSON.stringify(state);
  saveInFlight = (async ()=>{
    try{
      await window.storage.set(DB_KEY, payload, true);
      setSyncStatus('Saved \u00B7 shared with everyone on this link');
    }catch(e){
      console.warn('shared save failed, falling back to local only', e);
      setSyncStatus('Could not sync \u2014 saved on this device only', true);
    }
  })();
  await saveInFlight;
}

async function load(){
  try{
    const result = await window.storage.get(DB_KEY, true);
    if(result && result.value){
      state = JSON.parse(result.value);
      normalizeTasks();
      lastSavedRev = state.rev||0;
      setSyncStatus('Saved \u00B7 shared with everyone on this link');
      return true;
    }
  }catch(e){
    console.warn('shared load failed, trying local fallback', e);
    try{
      const raw = localStorage.getItem(DB_KEY);
      if(raw){ state = JSON.parse(raw); normalizeTasks(); lastSavedRev = state.rev||0;
        setSyncStatus('Could not reach shared storage \u2014 showing last local copy', true);
        return true; }
    }catch(e2){}
  }
  return false;
}

// Poll for changes made by other people/devices. If our own save just landed,
// skip the next tick so we don't immediately re-pull our own write.
let pollTimer = null;
function startSyncPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async ()=>{
    if(suppressNextPoll){ suppressNextPoll = false; return; }
    if(document.getElementById('modal-overlay').classList.contains('open')) return; // don't yank state out from under an open form
    try{
      const result = await window.storage.get(DB_KEY, true);
      if(result && result.value){
        const incoming = JSON.parse(result.value);
        if((incoming.rev||0) > lastSavedRev){
          const myRangeStart = state.rangeStart;
          state = incoming;
          state.rangeStart = myRangeStart; // each viewer keeps their own "today"-anchored window
          normalizeTasks();
          lastSavedRev = state.rev||0;
          render();
          setSyncStatus('Updated from another device \u00B7 ' + new Date().toLocaleTimeString());
        }
      }
    }catch(e){ /* transient network errors are fine to ignore on a poll */ }
  }, 4000);
}

/* ============================ LAYOUT CONSTANTS ============================ */
// Base width fits the full year to the available viewport at zoomLevel 1.
// Scroll-wheel zoom (ctrl/cmd + wheel, or pinch) scales zoomLevel, making the
// timeline wider than the viewport so the area becomes horizontally scrollable.
const ZOOM_MIN = 1;
const ZOOM_MAX = 12;
function baseDayWidth(){
  const scroller = document.getElementById('chart-scroll');
  const w = scroller ? scroller.clientWidth - 230 - 300 : 600; // subtract sidebar + people columns
  return Math.max(w / totalDays(), 0.5);
}
function pxPerDay(){
  return baseDayWidth() * (state.zoomLevel || 1);
}
function totalDays(){
  // span from rangeStart to at least 12 months after today, or end of last task
  return Math.max(365, daysBetween(state.rangeStart, rangeEnd()));
}
function rangeEnd(){
  // always show at least 12 months from today
  const minEnd = addMonths(todayISO(), 12);
  // also show up to 1 month past the last task end date
  let maxTaskEnd = minEnd;
  (state.categories||[]).forEach(cat=>{
    (cat.children||[]).forEach(sub=>{
      (sub.tasks||[]).forEach(t=>{ if(t.end > maxTaskEnd) maxTaskEnd = t.end; });
      (sub.children||[]).forEach(ss=>{
        (ss.tasks||[]).forEach(t=>{ if(t.end > maxTaskEnd) maxTaskEnd = t.end; });
      });
    });
  });
  return maxTaskEnd > minEnd ? addDaysISO(maxTaskEnd, 30) : minEnd;
}

/* ============================ TREE FLATTENING ============================
  Produces a flat list of visible rows in display order, each:
  {type:'cat'|'sub'|'subsub', id, name, color, catId, subId, depth, hasChildren, collapsed}
============================================================================= */
function flattenRows(){
  const rows = [];
  for(const cat of state.categories){
    const catCollapsed = !!state.collapsedRows[cat.id];
    rows.push({type:'cat', id:cat.id, name:cat.name, color:cat.color, catId:cat.id, subId:null, subsubId:null,
      depth:0, hasChildren: cat.children.length>0, collapsed:catCollapsed,
      leads:cat.leads||[], members:cat.members||[], notes:cat.notes||''});
    if(catCollapsed) continue;
    for(const sub of cat.children){
      const subCollapsed = !!state.collapsedRows[sub.id];
      rows.push({type:'sub', id:sub.id, name:sub.name, color:cat.color, catId:cat.id, subId:sub.id, subsubId:null,
        depth:1, hasChildren: sub.children.length>0, collapsed:subCollapsed,
        leads:sub.leads||[], members:sub.members||[], notes:sub.notes||''});
      if(subCollapsed) continue;
      for(const subsub of sub.children){
        rows.push({type:'subsub', id:subsub.id, name:subsub.name, color:cat.color, catId:cat.id, subId:sub.id, subsubId:subsub.id,
          depth:2, hasChildren:false, collapsed:false,
          leads:subsub.leads||[], members:subsub.members||[], notes:subsub.notes||''});
      }
    }
  }
  return rows;
}

function tasksForRow(row){
  return state.tasks.filter(t=>{
    if(row.type==='cat') return t.catId===row.catId && !t.subId;
    if(row.type==='sub') return t.subId===row.subId && !t.subsubId;
    if(row.type==='subsub') return t.subsubId===row.subsubId;
    return false;
  });
}

/* ---- Lane assignment: greedily stacks tasks that overlap in time into separate
   lanes within the same row, so overlapping projects no longer sit on top of each
   other. Tasks that don't overlap anything share lane 0, same as before. ---- */
function assignLanes(tasks){
  const sorted = tasks.slice().sort((a,b)=> a.start < b.start ? -1 : (a.start > b.start ? 1 : 0));
  const laneEnds = []; // last end-date occupying each lane
  const placed = []; // {task, lane}
  sorted.forEach(t=>{
    let lane = laneEnds.findIndex(end => end <= t.start);
    if(lane === -1){ lane = laneEnds.length; }
    laneEnds[lane] = t.end;
    placed.push({task:t, lane});
  });
  const laneCount = laneEnds.length || 1;
  return {placed, laneCount};
}

function findCat(catId){ return state.categories.find(c=>c.id===catId); }
function findSub(catId, subId){ const c=findCat(catId); return c ? c.children.find(s=>s.id===subId) : null; }
function findSubsub(catId, subId, subsubId){ const s=findSub(catId,subId); return s ? s.children.find(x=>x.id===subsubId) : null; }

function peoplePreview(list, kind){

  const shown = list.slice(0,2);

const ROW_BASE_H = 34; // height for a single-lane row
const LANE_H = 26; // additional px per stacked lane beyond the first

function render(){
  const rows = flattenRows();
  const ppd = pxPerDay();
  const totalW = totalDays() * ppd;

  // give the timeline area (and its header counterpart) an explicit pixel width so the
  // row-area can grow wider than the viewport when zoomed in, enabling horizontal scroll
  elTimeline.style.width = totalW + 'px';
  document.getElementById('timeline-header-scroll').style.width = totalW + 'px';

  elRangeLabel.textContent = fmtDate(state.rangeStart) + '  \u2192  ' + fmtDate(rangeEnd()) +
    '  \u00B7  ' + (state.zoomLevel>1 ? Math.round(state.zoomLevel*100)+'% zoom \u2014 ctrl/cmd+scroll or pinch to adjust, scroll to pan' : 'full year, fit to screen \u2014 ctrl/cmd+scroll or pinch to zoom in');

  // category legend
  elCatLegend.innerHTML = '<span style="font-weight:600; color:var(--text);">Categories:</span>' +
    state.categories.map(c=>{
      const hex = COLOR_HEX[c.color] || COLOR_HEX.gray;
      return `<span class="legend-item"><span class="legend-swatch" style="border-top:none; width:9px; height:9px; border-radius:2px; background:${hex.border};"></span>${escapeHtml(c.name)}</span>`;
    }).join('');

  // person legend — shows each unique person with their colour dot
  {
    const allNames = new Set();
    (state.categories||[]).forEach(cat=>{
      (cat.leads||[]).forEach(n=>allNames.add(n));
      (cat.members||[]).forEach(n=>allNames.add(n));
      (cat.children||[]).forEach(sub=>{
        (sub.leads||[]).forEach(n=>allNames.add(n));
        (sub.members||[]).forEach(n=>allNames.add(n));
        (sub.children||[]).forEach(ss=>{
          (ss.leads||[]).forEach(n=>allNames.add(n));
          (ss.members||[]).forEach(n=>allNames.add(n));
        });
      });
    });
    const elPersonLegend = document.getElementById('person-legend');
    if(elPersonLegend){
      if(allNames.size > 0){
        elPersonLegend.innerHTML = '<span style="font-weight:600;color:var(--text);">People:</span>' +
          [...allNames].map(n=>{
            const pc = getPersonColor(n);
            return pc ? `<span class="legend-item"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${pc.dot};"></span>${escapeHtml(n)}</span>` : '';
          }).join('');
        elPersonLegend.style.display='flex';
      } else { elPersonLegend.style.display='none'; }
    }
  }

  // month header (always shown); week ticks only if there's room (week view / month view sized comfortably)
  let monthHtml = '';
  let cursor = state.rangeStart;
  let dayOffset = 0;
  while(dayOffset < totalDays()){
    const monthStart = cursor;
    const next = addMonths(cursor,1);
    let span = daysBetween(monthStart, next);
    if(dayOffset + span > totalDays()) span = totalDays() - dayOffset;
    const left = dayOffset * ppd;
    const w = span * ppd;
    const label = new Date(monthStart+'T00:00:00').toLocaleDateString('en-US',{month:'short', year:'numeric'});
    monthHtml += `<div class="month-label" style="left:${left}px; width:${w}px;">${label}</div>`;
    cursor = next;
    dayOffset += span;
  }
  let weekHtml = '';
  if(state.zoom !== 'quarter'){
    let wd = 0;
    while(wd < totalDays()){
      const isMonthStart = wd===0 || isFirstOfMonth(addDaysISO(state.rangeStart, wd));
      weekHtml += `<div class="week-tick${isMonthStart?' month-start':''}" style="left:${wd*ppd}px;"></div>`;
      wd += 7;
    }
  }
  elMonthRow.innerHTML = monthHtml + weekHtml;
  elMonthRow.style.width = totalW + 'px';

  // sidebar + timeline + people rows
  let sidebarHtml = '';
  let timelineHtml = '';
  // past-days shading: a translucent overlay over days before today
  const todayOffsetPast = Math.max(0, Math.min(daysBetween(state.rangeStart, todayISO()), totalDays()));
  const pastW = todayOffsetPast * ppd;
  // we'll inject this as a fixed overlay after building rows
  let leadsHtml = '';
  let membersHtml = '';
  const rowTops = []; // running top offset (px) for each row, used for today-line / events-layer height
  let runningTop = 0;
  rows.forEach((row)=>{
    const hex = COLOR_HEX[row.color] || COLOR_HEX.gray;
    const toggleIcon = row.hasChildren ? (row.collapsed ? '\u25B8' : '\u25BE') : '';
    const rowHasNotes = !!(row.notes && row.notes.trim());

    const rowTasks = tasksForRow(row);
    const {placed, laneCount} = assignLanes(rowTasks);
    const isStacked = laneCount > 1;
    const stackIsCollapsed = isStacked && !!state.stackCollapsed[row.id];
    const effectiveLanes = stackIsCollapsed ? 1 : laneCount;
    const rowH = ROW_BASE_H + (effectiveLanes-1)*LANE_H;
    rowTops.push(runningTop);
    runningTop += rowH;

    sidebarHtml += `
      <div class="tree-row ${row.type}" data-row-id="${row.id}" style="padding-left:${10+row.depth*16}px; height:${rowH}px;">
        <span class="toggle ${row.hasChildren?'':'empty'}" data-toggle="${row.id}">${toggleIcon}</span>
        <span class="swatch" style="background:${hex.border};"></span>
        <span class="label" title="${escapeHtml(row.name)}">${escapeHtml(row.name)}</span>
        ${rowHasNotes ? `<span class="sidebar-notes-dot" title="Has notes \u2014 click the pencil to view"></span>` : ''}
        ${isStacked ? `<span class="stack-toggle" data-stack-toggle="${row.id}" title="${stackIsCollapsed?'Expand overlapping tasks':'Collapse overlapping tasks back to one row'}">${laneCount}\u00D7 <span class="arrow">${stackIsCollapsed?'\u25B8':'\u25BE'}</span></span>` : ''}
        <span class="row-actions">
          <button class="icon-btn" data-add-child="${row.id}" data-row='${encodeURIComponent(JSON.stringify(row))}' title="Add sub-item">+</button>
          <button class="icon-btn" data-edit-row='${encodeURIComponent(JSON.stringify(row))}' title="Rename / color / notes">\u270E</button>
          <button class="icon-btn" data-del-row='${encodeURIComponent(JSON.stringify(row))}' title="Delete">\u00D7</button>
        </span>
      </div>`;

    let barsHtml = '';
    // when collapsed, count how many tasks land in lane 0+ so we can badge the front-most bar per overlap cluster
    const lane0Tasks = [];
    placed.forEach(({task:t, lane})=>{
      const startOffset = daysBetween(state.rangeStart, t.start);
      const endOffset = daysBetween(state.rangeStart, t.end);
      const left = Math.max(startOffset,0) * ppd;
      const width = Math.max((endOffset - Math.max(startOffset,0)) * ppd, 4);
      if(endOffset < 0 || startOffset > totalDays()) return;
      const effLane = stackIsCollapsed ? 0 : lane;
      const top = 5 + effLane*LANE_H;
      const classes = ['task-bar', 'style-'+t.lineStyle, 'status-'+t.status];
      // Person-tinted bar: if the row (or task's location) has a lead, use their colour
      let bg = t.status==='cancelled' ? '#e7e5dd' : hex.fill;
      let bd = t.status==='atrisk' ? '#c0392b' : hex.border;
      let col = t.status==='cancelled' ? '#6b6862' : hex.text;
      // try to find a person to colour-code by (prefer row leads, then cat leads)
      const barPersonName = (row.leads && row.leads.length > 0) ? row.leads[0] : null;
      if(barPersonName && t.status!=='cancelled'){
        const pc = getPersonColor(barPersonName);
        if(pc){ bg = pc.bg; if(t.status!=='atrisk') bd = pc.border; col = pc.text; }
      }
      const hasNotes = !!(t.notes && t.notes.trim());
      const tipParts = [`${escapeHtml(t.name)} (${fmtDateShort(t.start)} \u2013 ${fmtDateShort(t.end)}) \u2014 ${escapeHtml(t.phase)}`];
      if(hasNotes) tipParts.push('\u2014 has notes (click to view)');
      if(stackIsCollapsed) tipParts.push(`\u2014 1 of ${laneCount} overlapping tasks here, click ${laneCount}\u00D7 to expand`);
      barsHtml += `<div class="${classes.join(' ')}" data-task-id="${t.id}"
        style="left:${left}px; width:${width}px; top:${top}px; background:${bg}; border-color:${bd}; color:${col};"
        title="${tipParts.join(' ')}">
        <span class="tlabel">${escapeHtml(t.name)}</span>
        ${hasNotes ? `<span class="notes-dot" title="Has notes"></span>` : ''}
      </div>`;
      if(t.icon){
        barsHtml += `<div class="task-end-icon" data-task-id="${t.id}" style="left:${left+width}px; top:${top}px;" title="${escapeHtml(t.name)}">${escapeHtml(t.icon)}</div>`;
      }
    });
    timelineHtml += `<div class="grid-row ${row.type==='cat'?'cat':''}" data-row-id="${row.id}" style="height:${rowH}px;">${barsHtml}</div>`;

    leadsHtml += `<div class="people-row ${row.type==='cat'?'cat':''}" data-row-id="${row.id}" data-people-row="${row.id}" data-kind="lead" style="height:${rowH}px;">${peoplePreview(row.leads,'lead')}</div>`;
    membersHtml += `<div class="people-row ${row.type==='cat'?'cat':''}" data-row-id="${row.id}" data-people-row="${row.id}" data-kind="member" style="height:${rowH}px;">${peoplePreview(row.members,'member')}</div>`;
  });

  elSidebar.innerHTML = sidebarHtml || '';
  elTimeline.innerHTML = timelineHtml;
  // past-days shading overlay — sits on top of all bars but under today-line
  if(pastW > 0){
    let pastOverlay = document.getElementById('past-overlay');
    if(!pastOverlay){ pastOverlay = document.createElement('div'); pastOverlay.id='past-overlay'; elTimeline.appendChild(pastOverlay); }
    pastOverlay.style.cssText = `position:absolute;top:0;left:0;width:${pastW}px;height:100%;background:rgba(0,0,0,0.035);pointer-events:none;z-index:1;`;
  } else {
    const po = document.getElementById('past-overlay'); if(po) po.remove();
  }
  elLeadsCol.innerHTML = leadsHtml;
  elMembersCol.innerHTML = membersHtml;

  // today line — positioned relative to grid-wrap, offset by sidebar width
  const todayOffset = daysBetween(state.rangeStart, todayISO());
  const sidebarW = elSidebar.getBoundingClientRect().width;
  const fullHeight = Math.max(runningTop + 64, 64);
  if(todayOffset >= 0 && todayOffset <= totalDays()){
    const leftPx = todayOffset*ppd + sidebarW;
    elTodayLine.style.display='block';
    elTodayLine.style.left = leftPx+'px';
    elTodayLine.style.height = fullHeight+'px';
    elTodayFlag.style.display='block';
    elTodayFlag.style.left = leftPx+'px';
  } else {
    elTodayLine.style.display='none';
    elTodayFlag.style.display='none';
  }

  // meeting / baseline event lines — span every row, distinct per type
  const elEventsLayer = document.getElementById('events-layer');
  let eventsHtml = '';
  const sortedEvents = (state.events||[]).slice().sort((a,b)=> a.date < b.date ? -1 : 1);
  // track how many flags of each type have landed near the same offset, to stack labels and avoid overlap
  const stackCount = {};
  sortedEvents.forEach(ev=>{
    const offset = daysBetween(state.rangeStart, ev.date);
    if(offset < 0 || offset > totalDays()) return;
    const leftPx = offset*ppd + sidebarW;
    const stackKey = ev.type + ':' + Math.round(leftPx/26); // bucket nearby flags so labels don't overlap
    const stackIdx = stackCount[stackKey] || 0;
    stackCount[stackKey] = stackIdx + 1;
    const baseTop = ev.type==='meeting' ? 46 : 64;
    const top = baseTop + stackIdx*20;
    eventsHtml += `<div class="event-line ${ev.type}" data-event-id="${ev.id}" style="left:${leftPx}px; height:${fullHeight}px;" title="${escapeHtml(ev.name)} \u2014 ${fmtDate(ev.date)}"></div>`;
    eventsHtml += `<div class="event-flag ${ev.type}" data-event-id="${ev.id}" style="left:${leftPx}px; top:${top}px;" title="${escapeHtml(ev.name)} \u2014 ${fmtDate(ev.date)}">${escapeHtml(ev.name)}</div>`;
  });
  elEventsLayer.innerHTML = eventsHtml;
  elEventsLayer.style.height = fullHeight+'px';
  elEventsLayer.querySelectorAll('[data-event-id]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const ev = state.events.find(x=>x.id===el.getAttribute('data-event-id'));
      if(ev) openEventModal(ev);
    };
  });

  if(rows.length===0){
    elSidebar.innerHTML = `<div style="padding:30px 16px; color:var(--text-soft); font-size:12px;">No categories yet.<br><br>Click "+ Category" above to start.</div>`;
  }

  attachRowHandlers();
}

function addDaysISO(iso,n){
  const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function isFirstOfMonth(iso){
  return new Date(iso+'T00:00:00').getDate() === 1;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================ EVENT HANDLERS ============================ */
function attachRowHandlers(){
  elSidebar.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-toggle');
      if(!id) return;
      state.collapsedRows[id] = !state.collapsedRows[id];
      save(); render();
    };
  });
  elSidebar.querySelectorAll('[data-add-child]').forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      const row = JSON.parse(decodeURIComponent(el.getAttribute('data-row')));
      openAddChildModal(row);
    };
  });
  elSidebar.querySelectorAll('[data-edit-row]').forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      const row = JSON.parse(decodeURIComponent(el.getAttribute('data-edit-row')));
      openEditRowModal(row);
    };
  });
  elSidebar.querySelectorAll('[data-del-row]').forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      const row = JSON.parse(decodeURIComponent(el.getAttribute('data-del-row')));
      deleteRow(row);
    };
  });
  elTimeline.querySelectorAll('.task-bar, .task-end-icon').forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-task-id');
      const task = state.tasks.find(t=>t.id===id);
      if(task) openTaskModal(task);
    };
  });
  elTimeline.querySelectorAll('.grid-row').forEach(el=>{
    el.ondblclick=(e)=>{
      const rowId = el.getAttribute('data-row-id');
      const row = flattenRows().find(r=>r.id===rowId);
      if(!row) return;
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const dayOffset = Math.round(x / pxPerDay());
      const start = addDaysISO(state.rangeStart, dayOffset);
      const end = addDaysISO(start, 14);
      openTaskModal(null, row, start, end);
    };
  });
  document.querySelectorAll('[data-people-row]').forEach(el=>{
    el.onclick = ()=>{
      const rowId = el.getAttribute('data-people-row');
      const kind = el.getAttribute('data-kind');
      const row = flattenRows().find(r=>r.id===rowId);
      if(row) openPeopleModal(row, kind);
    };
  });
  elSidebar.querySelectorAll('[data-stack-toggle]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-stack-toggle');
      state.stackCollapsed[id] = !state.stackCollapsed[id];
      save(); render();
    };
  });

  attachRowHighlight();
}

/* ---- Synced row highlight: hovering any of the 4 parallel strips (tree row,
   timeline row, leads cell, members cell) for a row highlights all 4 at once ---- */
function setRowHighlight(rowId, on){
  document.querySelectorAll(`[data-row-id="${rowId}"]`).forEach(el=>{
    el.classList.toggle('row-highlight', on);
  });
}
let currentHighlightId = null;
function attachRowHighlight(){
  const rowArea = document.getElementById('row-area');
  rowArea.onmouseover = (e)=>{
    const strip = e.target.closest('[data-row-id]');
    const rowId = strip ? strip.getAttribute('data-row-id') : null;
    if(rowId === currentHighlightId) return;
    if(currentHighlightId) setRowHighlight(currentHighlightId, false);
    currentHighlightId = rowId;
    if(rowId) setRowHighlight(rowId, true);
  };
  rowArea.onmouseleave = ()=>{
    if(currentHighlightId) setRowHighlight(currentHighlightId, false);
    currentHighlightId = null;
  };
}

function deleteRow(row){
  if(!confirm(`Delete "${row.name}"${row.hasChildren?' and everything under it':''}? Tasks attached to it will also be removed.`)) return;
  if(row.type==='cat'){
    state.categories = state.categories.filter(c=>c.id!==row.catId);
    state.tasks = state.tasks.filter(t=>t.catId!==row.catId);
  } else if(row.type==='sub'){
    const cat = findCat(row.catId);
    cat.children = cat.children.filter(s=>s.id!==row.subId);
    state.tasks = state.tasks.filter(t=>t.subId!==row.subId);
  } else if(row.type==='subsub'){
    const sub = findSub(row.catId, row.subId);
    sub.children = sub.children.filter(x=>x.id!==row.subsubId);
    state.tasks = state.tasks.filter(t=>t.subsubId!==row.subsubId);
  }
  save(); render();
}

const overlay = document.getElementById('modal-overlay');
const modalEl = document.getElementById('modal');

function closeModal(){ overlay.classList.remove('open'); modalEl.innerHTML=''; }
overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
document.addEventListener('keydown', e=>{
  if(!overlay.classList.contains('open')) return;
  if(e.key==='Escape'){ closeModal(); return; }
  if(e.key==='Enter'){
    const tag = (e.target.tagName || '').toLowerCase();
    if(tag === 'textarea') return; // allow newlines in notes / people lists
    const saveBtn = document.getElementById('m-save');
    if(saveBtn){
      e.preventDefault();
      saveBtn.click();
    }
  }
});

function openModal(html){
  modalEl.innerHTML = html;
  overlay.classList.add('open');
}

// Collect all unique names ever used across leads + members in the whole chart
function allKnownPeople(){
  const seen = new Set();
  const scan = obj=>{
    (obj.leads||[]).forEach(n=>seen.add(n));
    (obj.members||[]).forEach(n=>seen.add(n));
    (obj.children||[]).forEach(scan);
  };
  (state.categories||[]).forEach(scan);
  return [...seen].sort((a,b)=>a.localeCompare(b));
}

function openPeopleModal(row, kind){
  const obj = getRowObject(row);
  if(!obj) return;
  if(!obj.leads) obj.leads = [];
  if(!obj.members) obj.members = [];
  const field = kind==='lead' ? 'leads' : 'members';
  const title = kind==='lead' ? 'Project leads' : 'Affiliated members';
  const current = obj[field].slice();
  const known = allKnownPeople();

  const chipStyle = `display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;background:#e9e5fb;color:#4b3f96;margin:3px;cursor:default;`;
  const removeStyle = `cursor:pointer;font-size:14px;line-height:1;color:#7a6ec4;`;

  openModal(`
    <h2>${title} \u2014 ${escapeHtml(row.name)}</h2>
    <div class="field">
      <label>Current people</label>
      <div id="m-chips" style="min-height:36px;padding:4px;border:1px solid var(--border-strong);border-radius:6px;background:#fafaf8;margin-bottom:6px;"></div>
    </div>
    ${known.length ? `
    <div class="field">
      <label>Add from known people</label>
      <select id="m-known-select" style="width:100%">
        <option value="">— pick a name —</option>
        ${known.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('')}
      </select>
    </div>` : ''}
    <div class="field">
      <label>${known.length ? 'Or type a new name' : 'Add a person'}</label>
      <div style="display:flex;gap:6px;">
        <input type="text" id="m-new-person" placeholder="e.g. J. Alvarez" style="flex:1">
        <button class="btn" id="m-add-btn">Add</button>
      </div>
    </div>
    <div id="modal-actions">
      <span></span>
      <div class="left-actions">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn primary" id="m-save">Save</button>
      </div>
    </div>
  `);

  let people = current.slice();

  function renderChips(){
    const el = document.getElementById('m-chips');
    if(!el) return;
    el.innerHTML = people.length
      ? people.map((n,i)=>`<span style="${chipStyle}">${escapeHtml(n)}<span style="${removeStyle}" data-i="${i}">&times;</span></span>`).join('')
      : '<span style="color:var(--text-faint);font-size:11px;font-style:italic;padding:4px;">No one added yet</span>';
    el.querySelectorAll('[data-i]').forEach(x=>{
      x.onclick = ()=>{ people.splice(+x.getAttribute('data-i'),1); renderChips(); };
    });
  }

  function addPerson(name){
    name = name.trim();
    if(!name || people.includes(name)) return;
    people.push(name);
    renderChips();
  }

  renderChips();

  if(known.length){
    document.getElementById('m-known-select').onchange = function(){
      if(this.value){ addPerson(this.value); this.value=''; }
    };
  }

  document.getElementById('m-add-btn').onclick = ()=>{
    const inp = document.getElementById('m-new-person');
    addPerson(inp.value);
    inp.value = '';
    inp.focus();
  };
  document.getElementById('m-new-person').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); document.getElementById('m-add-btn').click(); }
  });

  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('m-save').onclick = ()=>{
    obj[field] = people;
    save(); render(); closeModal();
  };
  setTimeout(()=>{ const el=document.getElementById('m-new-person'); if(el) el.focus(); }, 50);
}

/* ---- Task modal (create or edit) ---- */
function buildLocationOptions(selectedCatId, selectedSubId, selectedSubsubId){
  // returns array of {value, label, depth}
  const opts = [];
  state.categories.forEach(cat=>{
    opts.push({catId:cat.id, subId:null, subsubId:null, label:cat.name, depth:0});
    cat.children.forEach(sub=>{
      opts.push({catId:cat.id, subId:sub.id, subsubId:null, label:sub.name, depth:1});
      sub.children.forEach(subsub=>{
        opts.push({catId:cat.id, subId:sub.id, subsubId:subsub.id, label:subsub.name, depth:2});
      });
    });
  });
  return opts;
}

function openTaskModal(task, presetRow, presetStart, presetEnd){
  const isEdit = !!task;
  const opts = buildLocationOptions();
  if(opts.length===0){
    alert('Add a category first.');
    return;
  }
  let curCatId = task ? task.catId : (presetRow ? presetRow.catId : opts[0].catId);
  let curSubId = task ? task.subId : (presetRow ? presetRow.subId : null);
  let curSubsubId = task ? task.subsubId : (presetRow ? presetRow.subsubId : null);

  const locOptionsHtml = opts.map(o=>{
    const sel = (o.catId===curCatId && o.subId===curSubId && o.subsubId===curSubsubId) ? 'selected' : '';
    return `<option value="${o.catId}|${o.subId||''}|${o.subsubId||''}" ${sel}>${'\u2014 '.repeat(o.depth)}${escapeHtml(o.label)}</option>`;
  }).join('');

  const phaseOptionsHtml = PHASES.map(p=>`<option ${task && task.phase===p?'selected':''}>${p}</option>`).join('');

  openModal(`
    <h2>${isEdit? 'Edit task' : 'New task'}</h2>

      <label>Belongs to</label>
      <select id="m-location">${locOptionsHtml}</select>

    <div class="field-row">
      <div class="field"><label>Start date</label><input type="date" id="m-start" value="${task?task.start:(presetStart||todayISO())}"></div>

      <label>Phase / activity type</label>
      <select id="m-phase">${phaseOptionsHtml}</select>
    </div>
    <div class="field">
      <label>Confidence (line style)</label>
      <div class="radio-grid">
        <label class="radio-opt"><input type="radio" name="m-linestyle" value="confirmed" ${(!task||task.lineStyle==='confirmed')?'checked':''}> Confirmed <span class="preview-line"></span></label>
        <label class="radio-opt"><input type="radio" name="m-linestyle" value="tentative" ${task&&task.lineStyle==='tentative'?'checked':''}> Tentative <span class="preview-line dashed"></span></label>
      </div>
    </div>
    <div class="field">
      <label>Status</label>
      <div class="radio-grid">
        <label class="radio-opt"><input type="radio" name="m-status" value="normal" ${(!task||task.status==='normal')?'checked':''}> Normal</label>
        <label class="radio-opt"><input type="radio" name="m-status" value="atrisk" ${task&&task.status==='atrisk'?'checked':''}> At risk <span class="preview-line atrisk"></span></label>
        <label class="radio-opt"><input type="radio" name="m-status" value="cancelled" ${task&&task.status==='cancelled'?'checked':''}> Cancelled <span class="preview-line cancelled"></span></label>
      </div>

      <label>End marker (optional visual cue)</label>
      <div class="icon-row" id="m-icon-row"></div>
    </div>
    <div class="field"><label>Notes (optional \u2014 not shown on the chart, click the bar to see them)</label><textarea id="m-notes" rows="2">${task?escapeHtml(task.notes||''):''}</textarea></div>
    <div id="modal-actions">
      <div class="left-actions">
        ${isEdit ? '<button class="btn danger" id="m-delete">Delete task</button>' : '<span></span>'}

      state.tasks = state.tasks.filter(t=>t.id!==task.id);
      save(); render(); closeModal();
    };
  }
  document.getElementById('m-save').onclick = ()=>{
    const name = document.getElementById('m-name').value.trim();
    const start = document.getElementById('m-start').value;
    const end = document.getElementById('m-end').value;
    if(!name || !start || !end){ alert('Please fill in name, start, and end date.'); return; }
    if(end < start){ alert('End date must be on or after the start date.'); return; }
    const [catId, subId, subsubId] = document.getElementById('m-location').value.split('|');
    const phase = document.getElementById('m-phase').value;
    const lineStyle = document.querySelector('input[name="m-linestyle"]:checked').value;
    const status = document.querySelector('input[name="m-status"]:checked').value;
    const notes = document.getElementById('m-notes').value;
    const icon = chosenIcon;

    if(isEdit){
      Object.assign(task, {catId, subId: subId||null, subsubId: subsubId||null, name, start, end, phase, lineStyle, status, notes, icon});
    } else {
      state.tasks.push({id:uid('t'), catId, subId: subId||null, subsubId: subsubId||null, name, start, end, phase, lineStyle, status, notes, icon});
    }
    save(); render(); closeModal();
  };
  document.getElementById('m-name').focus();
}

function renderIconRow(containerId, selected, onPick){
  const c = document.getElementById(containerId);
  const noneOpt = `<span class="icon-opt none-opt${selected?'':' selected'}" data-icon="">None</span>`;
  const opts = ICONS.map(ic=>`<span class="icon-opt${ic===selected?' selected':''}" data-icon="${ic}">${ic}</span>`).join('');
  c.innerHTML = noneOpt + opts;
  c.querySelectorAll('.icon-opt').forEach(el=>{
    el.onclick = ()=>{
      c.querySelectorAll('.icon-opt').forEach(d=>d.classList.remove('selected'));
      el.classList.add('selected');
      onPick(el.getAttribute('data-icon'));
    };
  });
}

document.getElementById('btn-add-task').onclick = ()=> openTaskModal(null);

/* ---- Meeting / Baseline event modal ---- */
function openEventModal(event, presetType, presetDate){
  const isEdit = !!event;
  const type = event ? event.type : (presetType || 'meeting');
  const isMeeting = type === 'meeting';
  const title = isEdit ? `Edit ${isMeeting?'meeting':'baseline release'}` : (isMeeting ? 'New team meeting' : 'New baseline release');
  const nameLabel = isMeeting ? 'Meeting name' : 'Baseline name';
  const namePlaceholder = isMeeting ? 'e.g. Aero team sync' : 'e.g. Baseline 3.0 release';

  openModal(`
    <h2>${title}</h2>
    <div class="scope-note">${isMeeting ? 'Shown as a dotted blue line across every row \u2014 visible to the whole team regardless of category.' : 'Shown as a solid gold line across every row, marking when a new baseline is released.'}</div>
    <div class="field"><label>${nameLabel}</label><input type="text" id="m-name" value="${event?escapeHtml(event.name):''}" placeholder="${namePlaceholder}"></div>
    <div class="field"><label>Date</label><input type="date" id="m-date" value="${event?event.date:(presetDate||todayISO())}"></div>
    <div class="field"><label>Notes (optional)</label><textarea id="m-notes" rows="2">${event?escapeHtml(event.notes||''):''}</textarea></div>
    <div id="modal-actions">
      <div class="left-actions">
        ${isEdit ? '<button class="btn danger" id="m-delete">Delete</button>' : '<span></span>'}
      </div>
      <div class="left-actions">
        <button class="btn" id="m-cancel">Cancel</button>
        <button class="btn primary" id="m-save">${isEdit?'Save changes':'Add'}</button>
      </div>
    </div>
  `);

  document.getElementById('m-cancel').onclick = closeModal;
  if(isEdit){
    document.getElementById('m-delete').onclick = ()=>{
      if(!confirm(`Delete this ${isMeeting?'meeting':'baseline release'}?`)) return;
      state.events = state.events.filter(e=>e.id!==event.id);
      save(); render(); closeModal();
    };
  }
  document.getElementById('m-save').onclick = ()=>{
    const name = document.getElementById('m-name').value.trim();
    const date = document.getElementById('m-date').value;
    const notes = document.getElementById('m-notes').value;
    if(!name || !date){ alert('Please fill in a name and date.'); return; }
    if(isEdit){
      Object.assign(event, {name, date, notes});
    } else {
      if(!state.events) state.events = [];
      state.events.push({id:uid('ev'), type, name, date, notes});
    }
    save(); render(); closeModal();
  };
  document.getElementById('m-name').focus();
}

document.getElementById('btn-add-meeting').onclick = ()=> openEventModal(null, 'meeting');
document.getElementById('btn-add-baseline').onclick = ()=> openEventModal(null, 'baseline');

/* ============================ TOP BAR ACTIONS ============================ */
document.getElementById('btn-today').onclick = ()=>{
  // Scroll so today line sits right at the left edge of the timeline (just after the sidebar)
  const scroller = document.getElementById('chart-scroll');
  const todayOffset = daysBetween(state.rangeStart, todayISO());
  const targetX = todayOffset * pxPerDay();
  scroller.scrollTo({left: Math.max(0, targetX), behavior: 'smooth'});
};

document.getElementById('zoom-select').onchange = (e)=>{
  state.zoom = e.target.value;
  render();
};

document.getElementById('btn-reset-zoom').onclick = ()=>{
  state.zoomLevel = 1;
  save(); render();
};

/* ---- Scroll-wheel / pinch zoom on the timeline ----
   Hold Ctrl or Cmd while scrolling (or pinch on a trackpad, which browsers report
   as a wheel event with ctrlKey set) to zoom the timeline horizontally in/out,
   anchored under the cursor so the zoom feels natural. Plain scrolling still
   scrolls the chart normally (vertically, or horizontally with shift/trackpad). */
const elChartScroll = document.getElementById('chart-scroll');
elChartScroll.addEventListener('wheel', (e)=>{
  if(!(e.ctrlKey || e.metaKey)) return; // let normal scroll pass through untouched
  e.preventDefault();
  const rect = elChartScroll.getBoundingClientRect();
  const cursorX = e.clientX - rect.left + elChartScroll.scrollLeft;
  const sidebarW = elSidebar.getBoundingClientRect().width;
  const dayUnderCursorBefore = (cursorX - sidebarW) / pxPerDay();

  const factor = Math.exp(-e.deltaY * 0.0035); // smooth multiplicative zoom, works for trackpad + mouse wheel
  const newLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, (state.zoomLevel||1) * factor));
  if(newLevel === state.zoomLevel) return;
  state.zoomLevel = newLevel;
  render();

  // keep the same calendar day under the cursor after the resize
  const newCursorX = dayUnderCursorBefore * pxPerDay() + sidebarW;
  elChartScroll.scrollLeft += (newCursorX - cursorX);
  save();
}, {passive:false});

let resizeRaf = null;
window.addEventListener('resize', ()=>{
  if(resizeRaf) cancelAnimationFrame(resizeRaf);
  resizeRaf = requestAnimationFrame(render);
});

document.getElementById('btn-export').onclick = ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'gantt-data-'+todayISO()+'.json';
  a.click();
  URL.revokeObjectURL(url);
};

/* ---- PDF / Image export ---- */
document.getElementById('btn-export-img').onclick = async ()=>{
  const btn = document.getElementById('btn-export-img');
  btn.disabled = true;
  btn.textContent = 'Capturing…';

  // Temporarily hide controls that shouldn't appear in the export
  const topbar = document.getElementById('topbar');
  const legend = document.getElementById('legend');
  const origTopbarDisplay = topbar.style.display;
  const origLegendDisplay = legend.style.display;

  // Scroll timeline to start for capture
  const scroller = document.getElementById('chart-scroll');
  const origScrollLeft = scroller.scrollLeft;
  scroller.scrollLeft = 0;

  await new Promise(r=>setTimeout(r,100));

  try{
    const gridWrap = document.getElementById('grid-wrap');
    const canvas = await html2canvas(gridWrap, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f7f6f3',
      scrollX: 0,
      scrollY: -window.scrollY,
      width: gridWrap.scrollWidth,
      height: gridWrap.scrollHeight,
      windowWidth: gridWrap.scrollWidth + 500,
    });

    // Try to open PDF-like print dialog first; fallback to PNG download
    const imgData = canvas.toDataURL('image/png');

    // Create a print window with the image for PDF save
    const printWin = window.open('', '_blank');
    if(printWin){
      printWin.document.write(`<!DOCTYPE html><html><head><title>Gantt Chart Export</title>
        <style>
          body{margin:0;padding:16px;background:#f7f6f3;font-family:sans-serif;}
          h2{font-size:14px;color:#555;margin:0 0 10px;font-weight:500;}
          img{max-width:100%;border:1px solid #ddd;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
          .hint{font-size:11px;color:#999;margin-top:8px;}
        </style></head><body>
        <h2>Project Timeline — ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</h2>
        <img src="${imgData}">
        <p class="hint">To save as PDF: File → Print → Save as PDF. To save as image: right-click the image → Save image as…</p>
        <script>window.onload=()=>{ setTimeout(()=>window.print(),400); }<\/script>
        </body></html>`);
      printWin.document.close();
    } else {
      // popup blocked — just download PNG
      const a = document.createElement('a');
      a.href = imgData;
      a.download = 'gantt-chart-' + new Date().toISOString().slice(0,10) + '.png';
      a.click();
    }
  } catch(err){
    console.error(err);
    alert('Export failed — try the JSON export instead, or take a screenshot.');
  }

  scroller.scrollLeft = origScrollLeft;
  btn.disabled = false;
  btn.textContent = '📄 Export PDF / Image';
};
document.getElementById('file-import').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.categories || !parsed.tasks){ throw new Error('bad format'); }
      state = parsed;
      if(!state.collapsedRows) state.collapsedRows = {};
      if(!state.stackCollapsed) state.stackCollapsed = {};
      if(!state.zoom) state.zoom = 'week';
      if(!state.zoomLevel) state.zoomLevel = 1;
      normalizeTasks();
      save(); render();
    }catch(err){
      alert('Could not read that file — make sure it is a JSON export from this tool.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

/* ============================ INIT ============================ */
async function init(){
  setSyncStatus('Loading shared chart\u2026');
  const loaded = await load();
  if(!loaded || !state.categories || state.categories.length===0){
    if(!loaded){
      seedData();
      await save(); // publish the seed data immediately so the first person to open this link creates the shared baseline
    }
  }
  // Anchor rangeStart to the earliest task/event, or 2 months before today — whichever is earlier
  let earliest = addMonths(todayISO(), -2);
  (state.categories||[]).forEach(cat=>{
    (cat.children||[]).forEach(sub=>{
      (sub.tasks||[]).forEach(t=>{ if(t.start < earliest) earliest = t.start; });
      (sub.children||[]).forEach(ss=>{
        (ss.tasks||[]).forEach(t=>{ if(t.start < earliest) earliest = t.start; });
      });
    });
  });
  (state.events||[]).forEach(ev=>{ if(ev.date < earliest) earliest = ev.date; });
  state.rangeStart = earliest;
  if(!state.zoom) state.zoom = 'week';
  if(!state.zoomLevel) state.zoomLevel = 1;
  if(!state.collapsedRows) state.collapsedRows = {};
  if(!state.stackCollapsed) state.stackCollapsed = {};
  document.getElementById('zoom-select').value = state.zoom;
  render();
  startSyncPolling();
  // bring the today-line into view on first load
  setTimeout(()=>{ elTodayLine.scrollIntoView({block:'center'}); }, 80);
}
init();

})();
